name: Build & Release

permissions:
  contents: write
  
on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Manually create a tag and publish to Release (leave blank to not create/publish, for example: v1.0.0)'
        required: false
        default: ''
      upload_artifact:
        description: 'Whether to upload the APK to Actions Artifacts (only effective when triggered manually)'
        type: boolean
        required: true
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensure all history is pulled to facilitate manual creation of Tags
      
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1" "ndk;27.2.12479018"

      - name: Clone llama.cpp
        run: git clone --branch b9464 --depth 1 https://github.com/ggml-org/llama.cpp.git app/src/main/cpp/llama.cpp

      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: /opt/vulkan-sdk
          key: vulkan-sdk-1.4.321.0-v2

      - name: Download Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o /tmp/vulkan-sdk.tar.xz "https://sdk.lunarg.com/sdk/download/1.4.321.0/linux/vulkansdk-linux-x86_64-1.4.321.0.tar.xz"
          mkdir -p /opt/vulkan-sdk
          tar -xf /tmp/vulkan-sdk.tar.xz -C /opt/vulkan-sdk
          rm /tmp/vulkan-sdk.tar.xz

      - name: Set VULKAN_SDK
        run: |
          VK_ROOT=$(dirname "$(dirname "$(find /opt/vulkan-sdk -name glslc -type f | head -1)")")
          echo "VULKAN_SDK=$VK_ROOT" >> "$GITHUB_ENV"

      
      - name: Build debug APK
        run: ./gradlew clean assembleDebug

      
      - name: Determine Version and Prepare Release File
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG_NAME="${{ github.event.inputs.release_tag }}"
          elif echo "${{ github.ref }}" | grep -q "^refs/tags/"; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME=""
          fi
          
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          
          
          if [ -n "$TAG_NAME" ]; then
            NEW_NAME="Parlex-${TAG_NAME}.apk"
            cp "app/build/outputs/apk/debug/app-debug.apk" "app/build/outputs/apk/debug/$NEW_NAME"
            echo "release_apk_name=$NEW_NAME" >> $GITHUB_OUTPUT
          fi

      
      - name: Upload APK artifact
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifact == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      
      - name: Create Release
        if: ${{ steps.get_tag.outputs.tag_name != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          name: ${{ steps.get_tag.outputs.tag_name }}
          files: app/build/outputs/apk/debug/${{ steps.get_tag.outputs.release_apk_name }}
          generate_release_notes: true
