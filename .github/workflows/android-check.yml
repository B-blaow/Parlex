name: Android Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Debug build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build dependencies
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;37.0.0" \
            "ndk;27.3.13750724" \
            "cmake;3.22.1"

      - name: Restore llama.cpp native engine
        run: |
          LLAMA_COMMIT="$(awk '/^llama.cpp commit:/ { print $3 }' app/src/main/cpp/llama.cpp.version)"
          test -n "$LLAMA_COMMIT"
          git clone --filter=blob:none https://github.com/ggml-org/llama.cpp.git app/src/main/cpp/llama.cpp
          git -C app/src/main/cpp/llama.cpp checkout "$LLAMA_COMMIT"

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
